<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Fetch API</title>
    </head>

    <body>
        <div class="bg-white">
            <div class="max-w-6xl mx-auto p-4">
              <div class="text-center">
                <h2 class="text-3xl font-extrabold text-slate-900 inline-block relative after:absolute after:w-4/6 after:h-1 after:left-0 after:right-0 after:-bottom-4 after:mx-auto after:bg-green-400 after:rounded-lg-full">Fetch API</h2>
              </div>
              <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-16 max-lg:max-w-3xl max-sm:max-w-md mx-auto">
                

              </div>
            </div>
        </div>

        <script>
            img = ["https://i.pinimg.com/736x/08/1b/71/081b71007d6b9c90b70b6d9c3d87b9e8.jpg","https://i.pinimg.com/736x/d6/66/0c/d6660c6eff0d722d851769bee19e647b.jpg","https://i.pinimg.com/736x/9f/3c/20/9f3c20db102aa7d4865f597854957adf.jpg","https://i.pinimg.com/1200x/16/95/15/169515051941e41dfd1fa723d8384696.jpg","https://i.pinimg.com/1200x/da/50/f7/da50f7465f6809d848b47c96eef5f353.jpg","https://i.pinimg.com/736x/dd/46/5a/dd465a9c49b44746c374e3ba2b87b66d.jpg","https://i.pinimg.com/736x/05/ab/ba/05abba99612dd7bd298a244f2caa02f0.jpg","https://i.pinimg.com/736x/f5/1d/7f/f51d7f61be4693772278d248412e2599.jpg","https://i.pinimg.com/736x/66/f9/14/66f914643eada746abb0198091ea4716.jpg","https://i.pinimg.com/736x/29/73/76/297376dd880db7e5b7b415e46ca08711.jpg",""]
            x = 0 
            fetch('https://jsonplaceholder.typicode.com/users')
                .then(res => res.json())
                .then(res => {
                    res.map(item => {
                    cards.innerHTML += `<div class="bg-white cursor-pointer rounded-lg overflow-hidden [box-shadow:0_2px_10px_-3px_rgba(6,81,237,0.3)] relative group">
                        <div class="w-full aspect-[119/128]">
                          <img src="${img[x++]}" alt="Blog Post 1" class="w-full h-full object-cover" />
                        </div>
                        <div class="p-6 absolute bottom-0 left-0 right-0 bg-green-200 opacity-90">
                          <span class="text-sm block text-slate-900 font-medium mb-2">
                            ${item.name} ${item.username} | ${item.website}
                          </span>
                          <h3 class="text-lg font-semibold text-slate-900 ">
                            ${item.email} | ${item.phone}
                          </h3>
                          <div class="max-h-0 overflow-hidden group-hover:max-h-40 group-hover:mt-4 transition-all duration-300">
                            <p class="text-slate-900 text-[15px] leading-relaxed">
                            <b> Address:</b> ${item.address.street}, ${item.address.suite}, ${item.address.city}, ${item.address.zipcode} | ${item.address.geo.lat}, ${item.address.geo.lng}
                            </p>
                            <p class="text-slate-900 text-[15px] leading-relaxed">
                                <b> Company:</b> ${item.company.name} — ${item.company.catchPhrase} | ${item.company.bs}  
                            </p>
                          </div>
                        </div>
                      </div>
                    `
                            })
                        })
        </script>
    </body>
</html>
